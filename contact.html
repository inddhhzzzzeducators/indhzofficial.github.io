<h1>Contact Us</h1>

<form id="contactForm">
  <input type="text" id="name" placeholder="Your Name" required><br>
  <input type="email" id="email" placeholder="Your Email" required><br>
  <textarea id="message" placeholder="Your Message" required></textarea><br>
  <button type="submit">Send</button>
</form>

<p id="response"></p>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    var data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    fetch("https://script.google.com/macros/s/AKfycbycJC6OHgjElHh84_zsTyUpBYmHuXqwUPG_joCh29ZInMW2Re8h_SFiV4sWT7TOIKHicg/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(response => response.text())
    .then(result => {
        document.getElementById("response").innerText = "Message Sent Successfully 🚀";
        document.getElementById("contactForm").reset();
    })
    .catch(error => {
        document.getElementById("response").innerText = "Error sending message!";
    });
});
</script>
