<!DOCTYPE html>
<html>
<head>
<title>Online Test - IND#Z</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
padding:40px;
}

.question{
margin:20px 0;
}

button{
padding:12px 25px;
background:#00f7ff;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

a{
display:block;
margin-top:20px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<h1>IND#Z Online Test</h1>

<form id="quizForm">

<div class="question">
<p>1. What does HTML stand for?</p>
<input type="radio" name="q1" value="0"> Hyper Trainer Marking Language<br>
<input type="radio" name="q1" value="1"> Hyper Text Markup Language<br>
<input type="radio" name="q1" value="0"> Hyper Text Marketing Language<br>
</div>

<div class="question">
<p>2. Which language is used for styling web pages?</p>
<input type="radio" name="q2" value="0"> HTML<br>
<input type="radio" name="q2" value="1"> CSS<br>
<input type="radio" name="q2" value="0"> Python<br>
</div>

<div class="question">
<p>3. Which is a JavaScript framework?</p>
<input type="radio" name="q3" value="1"> React<br>
<input type="radio" name="q3" value="0"> MySQL<br>
<input type="radio" name="q3" value="0"> PHP<br>
</div>

<button type="submit">Submit Test</button>

</form>

<div id="result"></div>

<script>
document.getElementById("quizForm").addEventListener("submit", function(e){
e.preventDefault();

let score = 0;
let answers = document.querySelectorAll("input[type='radio']:checked");

answers.forEach((ans)=>{
score += parseInt(ans.value);
});

document.getElementById("result").innerText = 
"Your Score: " + score + " / 3";
});
</script>

<a href="index.html">⬅ Back to Home</a>

</body>
</html>
