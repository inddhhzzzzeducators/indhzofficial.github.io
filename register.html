<!DOCTYPE html>
<html>
<head>
<title>Student Registration - IND#Z</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
padding:12px;
width:250px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:12px 25px;
background:#00f7ff;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:white;
}

a{
display:block;
margin-top:20px;
color:white;
text-decoration:none;
}

#response{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Student Registration</h1>

<form id="regForm">
<input type="text" id="name" placeholder="Full Name" required><br>
<input type="email" id="email" placeholder="Email" required><br>
<input type="text" id="classname" placeholder="Class (Example: 10)" required><br>
<input type="text" id="phone" placeholder="Phone Number" required><br>
<button type="submit">Register</button>
</form>

<p id="response"></p>

<script>
document.getElementById("regForm").addEventListener("submit", function(e){
e.preventDefault();

var data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
classname: document.getElementById("classname").value,
phone: document.getElementById("phone").value
};

fetch("https://script.google.com/macros/s/AKfycbxJ4u8Kv0rxOe8BINh00wqiNG6mhE318zcpy6tlwzI1o3nsUT_fT6E0kXBRkiJXz7afUg/exec", {
method: "POST",
body: JSON.stringify(data)
})
.then(response => response.text())
.then(result => {
document.getElementById("response").innerText = "Registration Successful 🚀";
document.getElementById("regForm").reset();
})
.catch(error => {
document.getElementById("response").innerText = "Error! Try again.";
});
});
</script>

<a href="index.html">⬅ Back to Home</a>

</body>
</html>
